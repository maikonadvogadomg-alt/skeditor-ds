name: Build Desktop Windows Linux Mac
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalar dependencias
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: 'true'
        run: npm install --legacy-peer-deps
      - name: Remover package.json conflitantes
        shell: bash
        run: find www -name "package.json" -delete 2>/dev/null || true
      - name: Build Windows
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: 'true'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win
      - name: Publicar Release Windows
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE=$(find dist -name "*.exe" 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then echo "EXE nao encontrado"; exit 1; fi
          gh release delete latest-windows --yes 2>/dev/null || true
          gh release create latest-windows --title "Windows SK Code Editor" --notes "SmartScreen: Mais informacoes > Executar assim mesmo" --latest "$FILE"
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - run: find www -name "package.json" -delete 2>/dev/null || true
      - name: Build Linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux
      - name: Publicar Release Linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE=$(find dist -name "*.AppImage" 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then echo "AppImage nao encontrado"; exit 1; fi
          gh release delete latest-linux --yes 2>/dev/null || true
          gh release create latest-linux --title "Linux SK Code Editor" --notes "chmod +x *.AppImage && ./*.AppImage" --latest "$FILE"
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalar dependencias
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm install --legacy-peer-deps
      - run: find www -name "package.json" -delete 2>/dev/null || true
      - name: Build Mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac
      - name: Publicar Release Mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE=$(find dist -name "*.dmg" 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then echo "DMG nao encontrado"; exit 1; fi
          gh release delete latest-mac --yes 2>/dev/null || true
          gh release create latest-mac --title "Mac SK Code Editor" --notes "Clique direito > Abrir na primeira vez" --latest "$FILE"
